<script>

//////////////////////////////////////////////////////////////
// GLOBALT
//////////////////////////////////////////////////////////////
const DEFAULT_PASS_ID = "DEFAULT_PASS";
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let arbetspass = [];
let passPositions = [];
let vilaPositions = [];  // NEW

let markeratPassId = null;
let markeradVila = null; // NEW
let redigerarIndex = -1;

let pågåendePass = null;

const btnStartStop = document.getElementById("btnStartStop");
const btnStartStopSet = document.getElementById("btnStartStopSet");

//////////////////////////////////////////////////////////////
// UTIL
//////////////////////////////////////////////////////////////
function avrundaTillMinut(date){
    return new Date(
        Math.floor(date.getTime() / 60000) * 60000
    );
}
function säkerställDefaultPass() {
    const finns = arbetspass.some(p => p.id === DEFAULT_PASS_ID);
    if (!finns) {
        arbetspass.push({
            id: DEFAULT_PASS_ID,
            start: new Date(2026, 0, 1, 4, 0),
            slut: new Date(2026, 0, 1, 5, 0)
        });
        sparaPass();
    }
}
function genereraId(){
    return "_" + Math.random().toString(36).substr(2,9);
}

function localDatetimeString(date){
    const pad = n => n.toString().padStart(2,"0");
    return date.getFullYear() + "-" +
        pad(date.getMonth()+1) + "-" +
        pad(date.getDate()) + "T" +
        pad(date.getHours()) + ":" +
        pad(date.getMinutes());
}

function parseLocalDatetime(s){
    if(!s) return null;
    const [datePart,timePart] = s.split("T");
    const [year,month,day] = datePart.split("-").map(Number);
    const [hour,minute] = timePart.split(":").map(Number);
    return new Date(year,month-1,day,hour,minute);
}

function msTillText(ms){
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${h}h ${m.toString().padStart(2,"0")}m`;
}

function skrivFDPResultat(text){
    document.getElementById("fdpResult").textContent = text;
}

//////////////////////////////////////////////////////////////
// LOCAL STORAGE
//////////////////////////////////////////////////////////////

document.getElementById("resetStorageBtn")
.addEventListener("click",()=>{
    localStorage.clear();
    alert("Minne nollställt");
    location.reload();
});

function laddaFrånMinne(){
    const sparade = localStorage.getItem("arbetspass");
    if(sparade){
        arbetspass = JSON.parse(sparade).map(p=>({
            id:p.id || genereraId(),
            start:avrundaTillMinut(new Date(p.start)),
            slut:avrundaTillMinut(new Date(p.slut))
        }));
    }
    const pågående = localStorage.getItem("pågåendePass");
    if(pågående){
        const p = JSON.parse(pågående);
        pågåendePass = {
            id:p.id,
            start:new Date(p.start)
        };
    }
}

function sparaPass(){
    localStorage.setItem(
        "arbetspass",
        JSON.stringify(arbetspass)
    );
}

//////////////////////////////////////////////////////////////
// KNAPPAR
//////////////////////////////////////////////////////////////

function uppdateraKnappar(){
    if(pågåendePass){
        btnStartStop.textContent = "Stoppa pass";
        btnStartStop.className = "knapp-grön";
        btnStartStopSet.textContent = "S+30";
        btnStartStopSet.className = "knapp-grön";
    }else{
        btnStartStop.textContent = "Starta pass";
        btnStartStop.className = "knapp-röd";
        btnStartStopSet.textContent = "Start SET";
        btnStartStopSet.className = "knapp-röd";
    }
}

//////////////////////////////////////////////////////////////
// PASS HANTERING
//////////////////////////////////////////////////////////////

function läggTillEllerUppdateraPass(){
    const s = parseLocalDatetime(document.getElementById("start").value);
    const e = parseLocalDatetime(document.getElementById("slut").value);
    if(!s || !e){
        alert("Fyll i tider");
        return;
    }
    if(e <= s){
        alert("Slut måste vara efter start");
        return;
    }
    if(redigerarIndex >= 0){
        arbetspass[redigerarIndex].start = s;
        arbetspass[redigerarIndex].slut = e;
    }else{
        arbetspass.push({
            id:genereraId(),
            start:s,
            slut:e
        });
    }
    sparaPass();
    rensaInmatning();
    uppdatera();
}

function rensaInmatning(){
    document.getElementById("start").value = "";
    document.getElementById("slut").value = "";
    redigerarIndex = -1;
    markeratPassId = null;
    markeradVila = null; // NEW
    document.getElementById("btnTaBort").disabled = true;
}

function taBortPass(){
    if(!markeratPassId) return;
    if (markeratPassId === DEFAULT_PASS_ID) {
        alert("Detta pass kan inte tas bort");
        return;
    }
    arbetspass = arbetspass.filter(p => p.id !== markeratPassId);
    sparaPass();
    rensaInmatning();
    uppdatera();
}

//////////////////////////////////////////////////////////////
// START STOP
//////////////////////////////////////////////////////////////

function startaEllerStoppaPass(){
    const nu = avrundaTillMinut(new Date());
    if(!pågåendePass){
        pågåendePass = {
            id:genereraId(),
            start:avrundaTillMinut(nu)
        };
        localStorage.setItem(
            "pågåendePass",
            JSON.stringify(pågåendePass)
        );
    }else{
        pågåendePass.slut = avrundaTillMinut(nu);
        arbetspass.push(pågåendePass);
        sparaPass();
        localStorage.removeItem("pågåendePass");
        pågåendePass = null;
    }
    uppdateraKnappar();
    uppdatera();
}

function startaEllerStoppaMedSet(){
    if(!pågåendePass){
        const starttid = parseLocalDatetime(
            document.getElementById("start").value
        );
        if(!starttid){
            alert("Ogiltig starttid");
            return;
        }
        pågåendePass = {
            id:genereraId(),
            start:starttid
        };
        localStorage.setItem(
            "pågåendePass",
            JSON.stringify(pågåendePass)
        );
    }else{
        pågåendePass.slut = new Date(Date.now() + 30*60000);
        arbetspass.push(pågåendePass);
        sparaPass();
        localStorage.removeItem("pågåendePass");
        pågåendePass = null;
    }
    uppdateraKnappar();
    uppdatera();
}

function harMinstEn4hVila(vilor){
    const FYRAH = 4 * 3600 * 1000;
    return vilor.some(v => {
        const vilaTid = v.slut - v.start;
        return vilaTid >= FYRAH;
    });
}

//////////////////////////////////////////////////////////////
// DEN ENDA FDP BERÄKNINGEN
//////////////////////////////////////////////////////////////
function byggDuty(pass, now){
    const MIN_VILA = 2 * 3600 * 1000;

    const sorter = [...pass]
        .filter(p => p.slut > p.start)
        .map(p => ({
            ...p,
            start: avrundaTillMinut(new Date(p.start)),
            slut: avrundaTillMinut(new Date(p.slut))
        }))
        .sort((a,b)=>a.start-b.start);

    const duty = [];

    for(const p of sorter){
        if(duty.length === 0){
            duty.push({
                start: new Date(p.start),
                slut: new Date(p.slut)
            });
            continue;
        }
        const prev = duty[duty.length - 1];
        const gap = p.start.getTime() - prev.slut.getTime();
        if(gap < MIN_VILA){
            prev.slut = new Date(
                Math.max(prev.slut.getTime(), p.slut.getTime())
            );
        } else {
            duty.push({
                start: new Date(p.start),
                slut: new Date(p.slut)
            });
        }
    }

    if(duty.length){
        const last = duty[duty.length - 1];
        const gapToNow = now.getTime() - last.slut.getTime();
        if(gapToNow < MIN_VILA){
            last.slut = new Date(now);
        }
    }

    return duty;
}

function beräknaFDP(now, pass){
    const H = 3600 * 1000;
    const MIN_VILA = 2 * H;
    const RESET = 8 * H;
    now = new Date(Math.floor(now.getTime() / 60000) * 60000);

    const sorter = [...pass]
        .filter(p => p.slut > p.start)
        .map(p => ({
            ...p,
            start: avrundaTillMinut(new Date(p.start)),
            slut: avrundaTillMinut(new Date(p.slut))
        }))
        .sort((a,b)=>a.start-b.start);

    const duty = byggDuty(sorter, now);

    for(let i=0;i<sorter.length;i++){
        const p = sorter[i];
        if(duty.length === 0){
            duty.push({
                start: new Date(p.start),
                slut: new Date(p.slut)
            });
            continue;
        }
        const prev = duty[duty.length - 1];
        const gap = p.start.getTime() - prev.slut.getTime();
        if(gap < MIN_VILA){
            prev.slut = new Date(
                Math.max(prev.slut.getTime(), p.slut.getTime())
            );
        }else{
            duty.push({
                start: new Date(p.start),
                slut: new Date(p.slut)
            });
        }
    }

    if(duty.length){
        const last = duty[duty.length - 1];
        const gapToNow = now.getTime() - last.slut.getTime();
        if(gapToNow < MIN_VILA){
            last.slut = new Date(now);
        }
    }

    const vilor = [];
    for(let i=0;i<sorter.length-1;i++){
        vilor.push({
            start: new Date(sorter[i].slut),
            slut: new Date(sorter[i+1].start)
        });
    }

    if(sorter.length){
        const sistaPass = sorter[sorter.length - 1];
        if(now.getTime() > sistaPass.slut.getTime()){
            vilor.push({
                start: new Date(sistaPass.slut),
                slut: new Date(now)
            });
        }
    }

    let fdpStart = new Date(now);
    let frånSammanhängande8h = false;

    if(sorter.length === 0){
        frånSammanhängande8h = true;
    }

    for(let i = vilor.length - 1; i >= 0; i--){
        const v = vilor[i];
        const vilaMs = v.slut.getTime() - v.start.getTime();
        if(vilaMs >= RESET){
            for(const d of duty){
                if(d.start.getTime() >= v.slut.getTime()){
                    fdpStart = new Date(d.start);
                    frånSammanhängande8h = true;
                    break;
                }
            }
            break;
        }
    }

    const giltigaVilor = vilor.filter(v =>
        (v.slut - v.start) >= MIN_VILA
    );

    for(const huvudblock of giltigaVilor){
        const huvudStart = huvudblock.start.getTime();
        const huvudSlut = huvudblock.slut.getTime();

        for(
            let kandidatTid = huvudStart;
            kandidatTid < huvudSlut;
            kandidatTid += 60 * 1000
        ){
            let totalVila = 0;
            let har4hBlock = false;

            for(const v of giltigaVilor){
                const s = Math.max(v.start.getTime(), kandidatTid);
                const e = Math.min(v.slut.getTime(), now.getTime());
                if(e <= s) continue;
                const vilaMs = e - s;
                totalVila += vilaMs;

                const blockStart = v.start.getTime();
                const blockEnd = Math.min(v.slut.getTime(), now.getTime());

                if(blockStart >= kandidatTid && (blockEnd - blockStart) >= 4 * H){
                    har4hBlock = true;
                } else if(
                    blockStart < kandidatTid &&
                    blockEnd > kandidatTid &&
                    (blockEnd - kandidatTid) >= 4 * H
                ){
                    har4hBlock = true;
                }
            }

            if(totalVila >= RESET && har4hBlock){
                if(kandidatTid > fdpStart.getTime()){
                    fdpStart = new Date(kandidatTid);
                    frånSammanhängande8h = false;
                }
            }
        }
    }

    let arbetstidMs = 0;
    for(const d of duty){
        const s = Math.max(d.start.getTime(), fdpStart.getTime());
        const e = Math.min(d.slut.getTime(), now.getTime());
        if(e > s){
            arbetstidMs += (e - s);
        }
    }

    fdpStart = new Date(Math.floor(fdpStart.getTime() / 60000) * 60000);

    return {
        duty,
        vilor,
        fdpStart,
        arbetstidMs,
        frånSammanhängande8h
    };
}

function uppfyllerViloregler(pass, endTime){
    const WINDOW = 24 * 3600 * 1000;
    const windowStart = endTime.getTime() - WINDOW;
    const duty = byggDuty(pass, endTime);
    const vilor = [];
    let cursor = windowStart;

    for(const d of duty){
        const dutyStart = Math.max(d.start.getTime(), windowStart);
        const dutySlut = Math.min(d.slut.getTime(), endTime.getTime());
        if(dutySlut <= dutyStart) continue;
        if(dutyStart > cursor){
            vilor.push({ start: cursor, slut: dutyStart });
        }
        cursor = Math.max(cursor, dutySlut);
    }

    if(endTime.getTime() > cursor){
        vilor.push({ start: cursor, slut: endTime.getTime() });
    }

    let totalVila = 0;
    let har4h = false;

    for(const v of vilor){
        const vilaMs = v.slut - v.start;
        totalVila += vilaMs;
        if(vilaMs >= 4 * 3600 * 1000){
            har4h = true;
        }
    }

    return {
        ok: totalVila >= 8 * 3600 * 1000 && har4h,
        totalVila,
        har4h
    };
}

function hittaVilobrottTid(now, pass){
    const STEP = 60 * 1000;

    // Find the end of the last duty block — that's the earliest point
    // where a rest violation could occur. Scanning from "now" (real clock)
    // is wrong because the shifts may already be old and the 24h window
    // slides past them, making everything look fine.
    const duty = byggDuty(pass, now);
    const sistaSlut = duty.length
        ? duty[duty.length - 1].slut.getTime()
        : now.getTime();

    // Scan from the earlier of (end of last duty) and (now),
    // going forward up to 48h, using the passes as-is (no dummy future shift).
    const scanStart = Math.min(sistaSlut, now.getTime());

    for(
        let t = scanStart;
        t < scanStart + 48 * 3600 * 1000;
        t += STEP
    ){
        const check = uppfyllerViloregler(pass, new Date(t));
        if(!check.ok){
            return new Date(t);
        }
    }
    return null;
}

//////////////////////////////////////////////////////////////
// CANVAS
//////////////////////////////////////////////////////////////

function storleksanpassaCanvas(){
    canvas.width = canvas.clientWidth;
    canvas.height = 240;
}

function nollställTid(date){
    return new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate()
    );
}

function formatDatum(date){
    const m = (date.getMonth()+1).toString().padStart(2,"0");
    const d = date.getDate().toString().padStart(2,"0");
    return m + "-"+ d;
}

function rita(){

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now = new Date(Math.floor(Date.now() / 60000) * 60000);

    //////////////////////////////////////////////////////////
    // FDP
    //////////////////////////////////////////////////////////

    let allaPass = [...arbetspass];

    if(pågåendePass){
        allaPass.push({
            id:pågåendePass.id,
            start:pågåendePass.start,
            slut:now
        });
    }

    const fdpState = beräknaFDP(now, allaPass);
    const vilor = fdpState.vilor;
    const duty = fdpState.duty;
    const MAX_FDP = 15 * 3600 * 1000;
    const arbetstid = fdpState.arbetstidMs;
    const kvarMs = MAX_FDP - arbetstid;

    let tid15h;
    if (kvarMs >= 0) {
        tid15h = new Date(now.getTime() + kvarMs);
    } else {
        tid15h = new Date(fdpState.fdpStart.getTime() + MAX_FDP);
    }

    const hh15 = tid15h.getHours().toString().padStart(2,"0");
    const mm15 = tid15h.getMinutes().toString().padStart(2,"0");
    const datum15 =
        (tid15h.getMonth()+1).toString().padStart(2,"0") +
        "-" +
        tid15h.getDate().toString().padStart(2,"0");

    let fdpText;
    if (kvarMs >= 0) {
        fdpText =
            "FDP duty " + msTillText(arbetstid) +
            ", 15h nås: " + datum15 + " " + hh15 + ":" + mm15;
    } else {
        fdpText =
            "FDP duty " + msTillText(arbetstid) +
            " (15h uppnåddes: " + datum15 + " " + hh15 + ":" + mm15 + ")";
    }

    document.getElementById("status").textContent = fdpText;

    const brottTid = hittaVilobrottTid(now, allaPass);
    const hh = brottTid.getHours().toString().padStart(2,"0");
    const mm = brottTid.getMinutes().toString().padStart(2,"0");
    const datumBrott =
        (brottTid.getMonth()+1).toString().padStart(2,"0") +
        "-" +
        brottTid.getDate().toString().padStart(2,"0");

    skrivFDPResultat(
        "Ingen 8h vila (med 4h block) från: " +
        datumBrott + " " + hh + ":" + mm
    );

    //////////////////////////////////////////////////////////
    // TIDSLINJER
    //////////////////////////////////////////////////////////

    const d0 = nollställTid(now);
    const d24 = new Date(d0.getTime() - 24*3600*1000);
    const pxPerMs = canvas.width / (24*3600*1000);

    const linjaler = [
        { label:formatDatum(d24), start:d24, y:70,  height:40 },
        { label:formatDatum(d0),  start:d0,  y:170, height:40 }
    ];

    //////////////////////////////////////////////////////////
    // RITA LINJALER
    //////////////////////////////////////////////////////////

    ctx.font = "16px monospace";

    linjaler.forEach(l=>{
        ctx.fillStyle = "#333";
        ctx.fillRect(0, l.y - l.height/2, canvas.width, l.height);

        ctx.fillStyle = "#aaa";
        ctx.fillText(l.label, 5, l.y - l.height/2 - 25);

        for(let m=0;m<=24;m++){
            const x = (m / 24) * canvas.width;
            ctx.strokeStyle = "#555";
            ctx.beginPath();
            ctx.moveTo(x, l.y - l.height/2);
            ctx.lineTo(x, l.y + l.height/2);
            ctx.stroke();

            if(m % 2 === 0 && m < 24){
                const text = Math.floor(m).toString().padStart(2,"0");
                const textWidth = ctx.measureText(text).width;
                ctx.fillStyle = "#aaa";
                ctx.fillText(text, x - textWidth/2, l.y - l.height/2 - 10);
            }
        }
    });

    //////////////////////////////////////////////////////////////
    // PASS
    //////////////////////////////////////////////////////////////

    passPositions = [];

    let sorter = [...arbetspass];

    if(pågåendePass){
        sorter.push({
            id:pågåendePass.id,
            start:pågåendePass.start,
            slut:now
        });
    }

    sorter.sort((a,b)=>a.start-b.start);

    sorter.forEach(p=>{
        linjaler.forEach(l=>{
            const linStart = l.start.getTime();
            const linEnd = linStart + 24*3600*1000;
            const start = Math.max(p.start.getTime(), linStart);
            const slut = Math.min(p.slut.getTime(), linEnd);
            if(slut <= start) return;

            const x = (start - linStart) * pxPerMs;
            const w = (slut - start) * pxPerMs;

            ctx.fillStyle = "#0f0";
            ctx.fillRect(x, l.y - 10, w, 20);

            passPositions.push({
                id:p.id,
                xStart:x,
                yStart:l.y - 10,
                bredd:w,
                höjd:20
            });

            if(p.id === markeratPassId){
                ctx.strokeStyle = "red";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, l.y - 10, w, 20);

                const durationMs = p.slut.getTime() - p.start.getTime();
                ctx.fillStyle = "white";
                ctx.font = "12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(msTillText(durationMs), x + w/2, l.y + 30);
            }
        });
    });

    //////////////////////////////////////////////////////////////
    // VILOPERIODER
    //////////////////////////////////////////////////////////////

    vilaPositions = []; // NEW - clear each frame

    vilor.forEach(v=>{
        const vilaTid = v.slut.getTime() - v.start.getTime();

        let färg;
        let höjd;

        if(vilaTid < 2*3600*1000){
            färg = "#0f0";
            höjd = 4;
        } else if(vilaTid >= 8*3600*1000){
            färg = "yellow";
            höjd = 10;
        } else if(vilaTid >= 4*3600*1000){
            färg = "#00f";
            höjd = 8;
        } else if(vilaTid >= 2*3600*1000){
            färg = "#88f";
            höjd = 6;
        } else {
            färg = "#0f0";
            höjd = 4;
        }

        // Check if this rest period is selected
        const ärMarkerad = markeradVila &&
            markeradVila.start.getTime() === v.start.getTime() &&
            markeradVila.slut.getTime() === v.slut.getTime();

        linjaler.forEach(l=>{
            const linStart = l.start.getTime();
            const linEnd = linStart + 24*3600*1000;
            const start = Math.max(v.start.getTime(), linStart);
            const slut = Math.min(v.slut.getTime(), linEnd);
            if(slut <= start) return;

            const x = (start - linStart) * pxPerMs;
            const w = (slut - start) * pxPerMs;

            ctx.fillStyle = färg;
            ctx.fillRect(x, l.y - höjd/2, w, höjd);

            // NEW - save position for hit testing
            vilaPositions.push({
                start: v.start,
                slut: v.slut,
                xStart: x,
                yStart: l.y - höjd/2,
                bredd: w,
                höjd: höjd,
                linjeY: l.y
            });

            // NEW - draw selection outline and duration label if selected
            if(ärMarkerad){
                ctx.strokeStyle = "red";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, l.y - höjd/2, w, höjd);

                ctx.fillStyle = "white";
                ctx.font = "12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(
                    msTillText(vilaTid),
                    x + w/2,
                    l.y + höjd/2 + 16
                );
            }
        });
    });

    //////////////////////////////////////////////////////////
    // NU-LINJE
    //////////////////////////////////////////////////////////

    const xNow = (now.getTime() - d0.getTime()) * pxPerMs;

    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(xNow, 0);
    ctx.lineTo(xNow, 240);
    ctx.stroke();

    //////////////////////////////////////////////////////////
    // FDP START MARKERING
    //////////////////////////////////////////////////////////

    const fdpStartDate = fdpState.fdpStart;

    linjaler.forEach(l=>{
        const linStart = l.start.getTime();
        const linEnd = linStart + 24*3600*1000;

        if(
            fdpStartDate.getTime() >= linStart &&
            fdpStartDate.getTime() <= linEnd
        ){
            const x = (fdpStartDate.getTime()-linStart) * pxPerMs;

            ctx.strokeStyle = "magenta";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, l.y - 20);
            ctx.lineTo(x, l.y + 30);
            ctx.stroke();

            ctx.fillStyle = "magenta";
            ctx.fillText("FDPStart", x, l.y + 45);
        }
    });
}

//////////////////////////////////////////////////////////////
// UPDATE LOOP
//////////////////////////////////////////////////////////////

function uppdatera(){
    storleksanpassaCanvas();
    rita();
    setTimeout(uppdatera, 1000);
}

//////////////////////////////////////////////////////////////
// KLICKA PÅ CANVAS
//////////////////////////////////////////////////////////////

canvas.addEventListener("click", e=>{
    const rect = canvas.getBoundingClientRect();
    const klickX = e.clientX - rect.left;
    const klickY = e.clientY - rect.top;

    // Scale click to canvas coordinate space
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const cx = klickX * scaleX;
    const cy = klickY * scaleY;

    let hittat = false;

    // Check work shifts first
    for(const p of passPositions){
        if(
            cx >= p.xStart &&
            cx <= p.xStart + p.bredd &&
            cy >= p.yStart &&
            cy <= p.yStart + p.höjd
        ){
            markeratPassId = p.id;
            markeradVila = null; // NEW - deselect rest

            const pass = arbetspass.find(x=>x.id===p.id);
            if(pass){
                document.getElementById("start").value =
                    localDatetimeString(pass.start);
                document.getElementById("slut").value =
                    localDatetimeString(pass.slut);
                redigerarIndex = arbetspass.findIndex(x=>x.id===p.id);
                document.getElementById("btnTaBort").disabled = false;
            }

            hittat = true;
            break;
        }
    }

    // NEW - check rest periods if no work shift was hit
    if(!hittat){
        for(const v of vilaPositions){
            if(
                cx >= v.xStart &&
                cx <= v.xStart + v.bredd &&
                cy >= v.yStart &&
                cy <= v.yStart + v.höjd
            ){
                markeradVila = { start: v.start, slut: v.slut };
                markeratPassId = null;
                redigerarIndex = -1;
                document.getElementById("btnTaBort").disabled = true;
                hittat = true;
                break;
            }
        }
    }

    // Deselect everything if nothing was hit
    if(!hittat){
        markeratPassId = null;
        markeradVila = null; // NEW
        redigerarIndex = -1;
        document.getElementById("btnTaBort").disabled = true;
    }

    rita();
});

//////////////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////////////

laddaFrånMinne();
säkerställDefaultPass();
uppdateraKnappar();
uppdatera();
</script>
