<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FDP</title>

<style>
    body {
        background: #111;
        color: #eee;
        font-family: sans-serif;
        text-align: center;
        margin: 10px;
        padding: 10px;
    }

    canvas {
        width: 100%;
        max-width: 1000px;
        height: auto;
        border: 1px solid #444;
        background: #222;
        margin: 10px auto;
        display: block;
        cursor: pointer;
    }

    input, button {
        font-size: 1em;
        margin: 5px;
        padding: 6px 8px;
        max-width: 90vw;
    }

    #status {
        margin-top: 10px;
        font-weight: bold;
    }

    #fdpResult {
        margin-top: 8px;
        font-weight: bold;
        color: orange;
    }

    button.knapp-grön {
        background: #0a0 !important;
        color: #fff !important;
        border: none;
    }

    button.knapp-röd {
        background: #a00 !important;
        color: #fff !important;
        border: none;
    }

    .control-group {
        white-space: nowrap;
        display: inline-block;
        margin-right: 1em;
    }

    #legend {
        margin: 15px auto 0;
        text-align: left;
        max-width: 1000px;
        font-size: 14px;
    }

    .legend-row {
        display: flex;
        align-items: center;
        margin: 6px 0;
    }

    .legend-swatch {
        margin-right: 10px;
        flex-shrink: 0;
    }

    .legend-copyright {
        margin-top: 16px;
        color: #666;
        font-size: 13px;
    }
</style>
</head>

<body>

<div>
    <div class="control-group">
        Starttid: <input type="datetime-local" id="start" />
    </div>
    <div class="control-group">
        Sluttid: <input type="datetime-local" id="slut" />
    </div>
    <button onclick="läggTillEllerUppdateraPass()">Add/Uppdatera</button>
    <button id="btnTaBort" onclick="taBortPass()" disabled>Delete pass</button>
    <button id="btnStartStop" onclick="startaEllerStoppaPass()">Starta pass</button>
    <button id="btnStartStopSet" onclick="startaEllerStoppaMedSet()">Start SET</button>
    <button id="resetStorageBtn">Nollställ</button>
</div>

<canvas id="canvas"></canvas>

<div id="status"></div>
<div id="fdpResult"></div>

<div id="legend">

    <div class="legend-row">
        <div class="legend-swatch" style="width:40px;height:12px;background:#0f0;"></div>
        <span>Arbetspass</span>
    </div>

    <div class="legend-row">
        <div class="legend-swatch" style="width:40px;height:4px;background:#0f0;"></div>
        <span>Vila &lt; 2h (räknas som arbete)</span>
    </div>

    <div class="legend-row">
        <div class="legend-swatch" style="width:40px;height:6px;background:#88f;"></div>
        <span>Vila 2h - 4h</span>
    </div>

    <div class="legend-row">
        <div class="legend-swatch" style="width:40px;height:10px;background:#00f;"></div>
        <span>Vila 4h - 8h</span>
    </div>

    <div class="legend-row">
        <div class="legend-swatch" style="width:40px;height:10px;background:yellow;"></div>
        <span>Vila ≥ 8h (FDP reset)</span>
    </div>

    <div class="legend-row">
        <div class="legend-swatch" style="width:3px;height:18px;background:magenta;"></div>
        <span>FDP start</span>
    </div>

    <div class="legend-copyright">
        Copyright Ove Lundström © FDPcalc 8.0
    </div>

</div>

<script>

//////////////////////////////////////////////////////////////
// GLOBALS
//////////////////////////////////////////////////////////////

const DEFAULT_PASS_ID = "DEFAULT_PASS";
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let arbetspass     = [];
let passPositions  = [];
let markeratPassId = null;
let redigerarIndex = -1;
let pågåendePass   = null;
let vilaPositions = [];
let markeradVilaIndex = null;

const btnStartStop    = document.getElementById("btnStartStop");
const btnStartStopSet = document.getElementById("btnStartStopSet");

//////////////////////////////////////////////////////////////
// UTILITIES
//////////////////////////////////////////////////////////////

function avrundaTillMinut(date) {
    return new Date(Math.floor(date.getTime() / 60000) * 60000);
}

function genereraId() {
    return "_" + Math.random().toString(36).substr(2, 9);
}

function localDatetimeString(date) {
    const pad = n => n.toString().padStart(2, "0");
    return date.getFullYear() + "-" +
        pad(date.getMonth() + 1) + "-" +
        pad(date.getDate()) + "T" +
        pad(date.getHours()) + ":" +
        pad(date.getMinutes());
}

function parseLocalDatetime(s) {
    if (!s) return null;
    const [datePart, timePart] = s.split("T");
    const [year, month, day]   = datePart.split("-").map(Number);
    const [hour, minute]       = timePart.split(":").map(Number);
    return new Date(year, month - 1, day, hour, minute);
}

function msTillText(ms) {
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${h}h ${m.toString().padStart(2, "0")}m`;
}

function skrivFDPResultat(text) {
    document.getElementById("fdpResult").textContent = text;
}

//////////////////////////////////////////////////////////////
// LOCAL STORAGE
//////////////////////////////////////////////////////////////

document.getElementById("resetStorageBtn").addEventListener("click", () => {
    localStorage.clear();
    alert("Minne nollställt");
    location.reload();
});

function laddaFrånMinne() {
    const sparade = localStorage.getItem("arbetspass");
    if (sparade) {
        arbetspass = JSON.parse(sparade).map(p => ({
            id:    p.id || genereraId(),
            start: avrundaTillMinut(new Date(p.start)),
            slut:  avrundaTillMinut(new Date(p.slut))
        }));
    }

    const pågående = localStorage.getItem("pågåendePass");
    if (pågående) {
        const p = JSON.parse(pågående);
        pågåendePass = { id: p.id, start: new Date(p.start) };
    }
}

function sparaPass() {
    localStorage.setItem("arbetspass", JSON.stringify(arbetspass));
}

function säkerställDefaultPass() {
    const finns = arbetspass.some(p => p.id === DEFAULT_PASS_ID);
    if (!finns) {
        arbetspass.push({
            id:    DEFAULT_PASS_ID,
            start: new Date(2026, 0, 1, 4, 0),
            slut:  new Date(2026, 0, 1, 5, 0)
        });
        sparaPass();
    }
}

//////////////////////////////////////////////////////////////
// BUTTON STATE
//////////////////////////////////////////////////////////////

function uppdateraKnappar() {
    if (pågåendePass) {
        btnStartStop.textContent    = "Stoppa pass";
        btnStartStop.className      = "knapp-grön";
        btnStartStopSet.textContent = "S+30";
        btnStartStopSet.className   = "knapp-grön";
    } else {
        btnStartStop.textContent    = "Starta pass";
        btnStartStop.className      = "knapp-röd";
        btnStartStopSet.textContent = "Start SET";
        btnStartStopSet.className   = "knapp-röd";
    }
}

//////////////////////////////////////////////////////////////
// SHIFT MANAGEMENT
//////////////////////////////////////////////////////////////

function läggTillEllerUppdateraPass() {
    const s = parseLocalDatetime(document.getElementById("start").value);
    const e = parseLocalDatetime(document.getElementById("slut").value);

    if (!s || !e) { alert("Fyll i tider"); return; }
    if (e <= s)   { alert("Slut måste vara efter start"); return; }

    if (redigerarIndex >= 0) {
        arbetspass[redigerarIndex].start = s;
        arbetspass[redigerarIndex].slut  = e;
    } else {
        arbetspass.push({ id: genereraId(), start: s, slut: e });
    }

    sparaPass();
    rensaInmatning();
    uppdatera();
}

function rensaInmatning() {
    document.getElementById("start").value = "";
    document.getElementById("slut").value  = "";
    redigerarIndex = -1;
    markeratPassId = null;
    document.getElementById("btnTaBort").disabled = true;
}

function taBortPass() {
    if (!markeratPassId) return;
    if (markeratPassId === DEFAULT_PASS_ID) {
        alert("Detta pass kan inte tas bort");
        return;
    }
    arbetspass = arbetspass.filter(p => p.id !== markeratPassId);
    sparaPass();
    rensaInmatning();
    uppdatera();
}

//////////////////////////////////////////////////////////////
// START / STOP
//////////////////////////////////////////////////////////////

function startaEllerStoppaPass() {
    const nu = avrundaTillMinut(new Date());

    if (!pågåendePass) {
        pågåendePass = { id: genereraId(), start: nu };
        localStorage.setItem("pågåendePass", JSON.stringify(pågåendePass));
    } else {
        pågåendePass.slut = nu;
        arbetspass.push(pågåendePass);
        sparaPass();
        localStorage.removeItem("pågåendePass");
        pågåendePass = null;
    }

    uppdateraKnappar();
    uppdatera();
}

function startaEllerStoppaMedSet() {
    if (!pågåendePass) {
        const starttid = parseLocalDatetime(document.getElementById("start").value);
        if (!starttid) { alert("Ogiltig starttid"); return; }
        pågåendePass = { id: genereraId(), start: starttid };
        localStorage.setItem("pågåendePass", JSON.stringify(pågåendePass));
    } else {
        pågåendePass.slut = new Date(Date.now() + 30 * 60000);
        arbetspass.push(pågåendePass);
        sparaPass();
        localStorage.removeItem("pågåendePass");
        pågåendePass = null;
    }

    uppdateraKnappar();
    uppdatera();
}

//////////////////////////////////////////////////////////////
// FDP CALCULATION
//////////////////////////////////////////////////////////////

function byggDuty(pass, now) {
    const MIN_VILA = 2 * 3600 * 1000;

    const sorter = [...pass]
        .filter(p => p.slut > p.start)
        .map(p => ({
            ...p,
            start: avrundaTillMinut(new Date(p.start)),
            slut:  avrundaTillMinut(new Date(p.slut))
        }))
        .sort((a, b) => a.start - b.start);

    const duty = [];

    for (const p of sorter) {
        if (duty.length === 0) {
            duty.push({ start: new Date(p.start), slut: new Date(p.slut) });
            continue;
        }

        const prev = duty[duty.length - 1];
        const gap  = p.start.getTime() - prev.slut.getTime();

        // FDP rule: rest < 2h counts as work
        if (gap < MIN_VILA) {
            prev.slut = new Date(Math.max(prev.slut.getTime(), p.slut.getTime()));
        } else {
            duty.push({ start: new Date(p.start), slut: new Date(p.slut) });
        }
    }

    // Extend last duty block to now if gap to now is < 2h
    if (duty.length) {
        const last     = duty[duty.length - 1];
        const gapToNow = now.getTime() - last.slut.getTime();
        if (gapToNow < MIN_VILA) last.slut = new Date(now);
    }

    return duty;
}

function beräknaFDP(now, pass) {
    const H        = 3600 * 1000;
    const MIN_VILA = 2 * H;
    const RESET    = 8 * H;

    now = avrundaTillMinut(now);

    // 1. Sort shifts
    const sorter = [...pass]
        .filter(p => p.slut > p.start)
        .map(p => ({
            ...p,
            start: avrundaTillMinut(new Date(p.start)),
            slut:  avrundaTillMinut(new Date(p.slut))
        }))
        .sort((a, b) => a.start - b.start);

    // 2. Build duty periods (rest < 2h = work)
    const duty = byggDuty(sorter, now);

    // 3. Build rest periods
    const vilor = [];

    for (let i = 0; i < sorter.length - 1; i++) {
        vilor.push({ start: new Date(sorter[i].slut), slut: new Date(sorter[i + 1].start) });
    }

    if (sorter.length) {
        const sistaPass = sorter[sorter.length - 1];
        if (now.getTime() > sistaPass.slut.getTime()) {
            vilor.push({ start: new Date(sistaPass.slut), slut: new Date(now) });
        }
    }

    // 4. Calculate FDP start
    let fdpStart             = new Date(now);
    let frånSammanhängande8h = sorter.length === 0;

    // A. Latest consecutive rest >= 8h resets FDP
    for (let i = vilor.length - 1; i >= 0; i--) {
        const v      = vilor[i];
        const vilaMs = v.slut.getTime() - v.start.getTime();

        if (vilaMs >= RESET) {
            // FDP start = first duty after the rest
            for (const d of duty) {
                if (d.start.getTime() >= v.slut.getTime()) {
                    fdpStart             = new Date(d.start);
                    frånSammanhängande8h = true;
                    break;
                }
            }
            break;
        }
    }

    // B. Split duty: search for a later valid FDP start
    const giltigaVilor = vilor.filter(v => (v.slut - v.start) >= MIN_VILA);

    for (const huvudblock of giltigaVilor) {
        const huvudStart = huvudblock.start.getTime();
        const huvudSlut  = huvudblock.slut.getTime();

        for (let kandidatTid = huvudStart; kandidatTid < huvudSlut; kandidatTid += 60000) {
            let totalVila  = 0;
            let har4hBlock = false;

            for (const v of giltigaVilor) {
                const s = Math.max(v.start.getTime(), kandidatTid);
                const e = Math.min(v.slut.getTime(), now.getTime());
                if (e <= s) continue;

                totalVila += (e - s);

                const blockStart = v.start.getTime();
                const blockEnd   = Math.min(v.slut.getTime(), now.getTime());

                // Case 1: entire block falls after candidate
                if (blockStart >= kandidatTid && (blockEnd - blockStart) >= 4 * H) {
                    har4hBlock = true;
                }
                // Case 2: candidate falls inside block — remaining portion must be >= 4h
                else if (blockStart < kandidatTid && blockEnd > kandidatTid && (blockEnd - kandidatTid) >= 4 * H) {
                    har4hBlock = true;
                }
            }

            if (totalVila >= RESET && har4hBlock && kandidatTid > fdpStart.getTime()) {
                fdpStart             = new Date(kandidatTid);
                frånSammanhängande8h = false;
            }
        }
    }

    // 5. Count working time within FDP window
    let arbetstidMs = 0;
    for (const d of duty) {
        const s = Math.max(d.start.getTime(), fdpStart.getTime());
        const e = Math.min(d.slut.getTime(), now.getTime());
        if (e > s) arbetstidMs += (e - s);
    }

    fdpStart = avrundaTillMinut(fdpStart);

    return { duty, vilor, fdpStart, arbetstidMs, frånSammanhängande8h };
}

function uppfyllerViloregler(pass, endTime) {
    const WINDOW      = 24 * 3600 * 1000;
    const windowStart = endTime.getTime() - WINDOW;

    const duty  = byggDuty(pass, endTime);
    const vilor = [];
    let cursor  = windowStart;

    for (const d of duty) {
        const dutyStart = Math.max(d.start.getTime(), windowStart);
        const dutySlut  = Math.min(d.slut.getTime(), endTime.getTime());

        if (dutySlut <= dutyStart) continue;

        if (dutyStart > cursor) vilor.push({ start: cursor, slut: dutyStart });
        cursor = Math.max(cursor, dutySlut);
    }

    if (endTime.getTime() > cursor) vilor.push({ start: cursor, slut: endTime.getTime() });

    let totalVila = 0;
    let har4h     = false;

    for (const v of vilor) {
        const vilaMs = v.slut - v.start;
        totalVila   += vilaMs;
        if (vilaMs >= 4 * 3600 * 1000) har4h = true;
    }

    return {
        ok: totalVila >= 8 * 3600 * 1000 && har4h,
        totalVila,
        har4h
    };
}

function hittaVilobrottTid(now, pass) {
    for (let t = now.getTime(); t < now.getTime() + 48 * 3600 * 1000; t += 60000) {
        const simPass = [
            ...pass,
            { start: avrundaTillMinut(new Date(now)), slut: avrundaTillMinut(new Date(t)) }
        ];
        if (!uppfyllerViloregler(simPass, new Date(t)).ok) return new Date(t);
    }
    return null;
}

//////////////////////////////////////////////////////////////
// CANVAS RENDERING
//////////////////////////////////////////////////////////////

function storleksanpassaCanvas() {
    canvas.width  = canvas.clientWidth;
    canvas.height = 240;
}

function nollställTid(date) {
    return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function formatDatum(date) {
    const m = (date.getMonth() + 1).toString().padStart(2, "0");
    const d = date.getDate().toString().padStart(2, "0");
    return m + "-" + d;
}

function rita() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now = avrundaTillMinut(new Date());

    // Collect all shifts including any active one
    const allaPass = [...arbetspass];
    if (pågåendePass) {
        allaPass.push({ id: pågåendePass.id, start: pågåendePass.start, slut: now });
    }

    //////////////////////////////////////////////////////////
    // FDP
    //////////////////////////////////////////////////////////

    const fdpState        = beräknaFDP(now, allaPass);
    const { vilor, duty } = fdpState;
    const MAX_FDP         = 15 * 3600 * 1000;
    const arbetstid       = fdpState.arbetstidMs;
    const kvarMs          = MAX_FDP - arbetstid;

    const tid15h = kvarMs >= 0
        ? new Date(now.getTime() + kvarMs)
        : new Date(fdpState.fdpStart.getTime() + MAX_FDP);

    const hh15    = tid15h.getHours().toString().padStart(2, "0");
    const mm15    = tid15h.getMinutes().toString().padStart(2, "0");
    const datum15 = (tid15h.getMonth() + 1).toString().padStart(2, "0") + "-" +
                    tid15h.getDate().toString().padStart(2, "0");

    document.getElementById("status").textContent = kvarMs >= 0
        ? `FDP duty ${msTillText(arbetstid)}, 15h nås: ${datum15} ${hh15}:${mm15}`
        : `FDP duty ${msTillText(arbetstid)} (15h uppnåddes: ${datum15} ${hh15}:${mm15})`;

    //////////////////////////////////////////////////////////
    // REST BREACH TIME
    //////////////////////////////////////////////////////////

    const brottTid   = hittaVilobrottTid(now, allaPass);
    const hh         = brottTid.getHours().toString().padStart(2, "0");
    const mm         = brottTid.getMinutes().toString().padStart(2, "0");
    const datumBrott = (brottTid.getMonth() + 1).toString().padStart(2, "0") + "-" +
                       brottTid.getDate().toString().padStart(2, "0");

    skrivFDPResultat(`Ingen 8h vila (med 4h block) från: ${datumBrott} ${hh}:${mm}`);

    //////////////////////////////////////////////////////////
    // TIME RULERS
    //////////////////////////////////////////////////////////

    const d0      = nollställTid(now);
    const d24     = new Date(d0.getTime() - 24 * 3600 * 1000);
    const pxPerMs = canvas.width / (24 * 3600 * 1000);

    const linjaler = [
        { label: formatDatum(d24), start: d24, y: 70,  height: 40 },
        { label: formatDatum(d0),  start: d0,  y: 170, height: 40 }
    ];

    ctx.font = "16px monospace";

    linjaler.forEach(l => {
        ctx.fillStyle = "#333";
        ctx.fillRect(0, l.y - l.height / 2, canvas.width, l.height);

        ctx.fillStyle = "#aaa";
        ctx.fillText(l.label, 5, l.y - l.height / 2 - 25);

        for (let m = 0; m <= 24; m++) {
            const x = (m / 24) * canvas.width;

            ctx.strokeStyle = "#555";
            ctx.beginPath();
            ctx.moveTo(x, l.y - l.height / 2);
            ctx.lineTo(x, l.y + l.height / 2);
            ctx.stroke();

            if (m % 2 === 0 && m < 24) {
                const text      = m.toString().padStart(2, "0");
                const textWidth = ctx.measureText(text).width;
                ctx.fillStyle   = "#aaa";
                ctx.fillText(text, x - textWidth / 2, l.y - l.height / 2 - 10);
            }
        }
    });

    //////////////////////////////////////////////////////////
    // SHIFTS
    //////////////////////////////////////////////////////////

    passPositions = [];

    const sorter = [...arbetspass];
    if (pågåendePass) {
        sorter.push({ id: pågåendePass.id, start: pågåendePass.start, slut: now });
    }
    sorter.sort((a, b) => a.start - b.start);

    sorter.forEach(p => {
        linjaler.forEach(l => {
            const linStart = l.start.getTime();
            const linEnd   = linStart + 24 * 3600 * 1000;
            const start    = Math.max(p.start.getTime(), linStart);
            const slut     = Math.min(p.slut.getTime(), linEnd);

            if (slut <= start) return;

            const x = (start - linStart) * pxPerMs;
            const w = (slut - start)     * pxPerMs;

            ctx.fillStyle = "#0f0";
            ctx.fillRect(x, l.y - 10, w, 20);

            passPositions.push({ id: p.id, xStart: x, yStart: l.y - 10, bredd: w, höjd: 20 });

            if (p.id === markeratPassId) {
                ctx.strokeStyle = "red";
                ctx.lineWidth   = 2;
                ctx.strokeRect(x, l.y - 10, w, 20);

                const durationMs = p.slut.getTime() - p.start.getTime();
                ctx.fillStyle    = "white";
                ctx.font         = "12px sans-serif";
                ctx.textAlign    = "center";
                ctx.fillText(msTillText(durationMs), x + w / 2, l.y + 30);
            }
        });
    });

    vilaPositions = [];

vilor.forEach((v, index) => {
    const vilaTid = v.slut.getTime() - v.start.getTime();
    let färg, höjd;

    if      (vilaTid >= 8 * 3600 * 1000) { färg = "yellow"; höjd = 10; }
    else if (vilaTid >= 4 * 3600 * 1000) { färg = "#00f";   höjd = 8;  }
    else if (vilaTid >= 2 * 3600 * 1000) { färg = "#88f";   höjd = 6;  }
    else                                  { färg = "#0f0";   höjd = 4;  }

    linjaler.forEach(l => {
        const linStart = l.start.getTime();
        const linEnd   = linStart + 24 * 3600 * 1000;

        const start = Math.max(v.start.getTime(), linStart);
        const slut  = Math.min(v.slut.getTime(), linEnd);
        if (slut <= start) return;

        const x = (start - linStart) * pxPerMs;
        const w = (slut - start) * pxPerMs;

        ctx.fillStyle = färg;
        ctx.fillRect(x, l.y - höjd / 2, w, höjd);

        // ⬅️ NYTT: spara position
        vilaPositions.push({
            index,
            xStart: x,
            yStart: l.y - höjd / 2,
            bredd: w,
            höjd: höjd,
            vila: v
        });

        // ⬅️ NYTT: rita markering + tid
        if (markeradVilaIndex === index) {
            ctx.strokeStyle = "cyan";
            ctx.lineWidth = 2;
            ctx.strokeRect(x, l.y - höjd / 2, w, höjd);

            const durationMs = v.slut - v.start;
            ctx.fillStyle = "white";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(msTillText(durationMs), x + w / 2, l.y + 25);
        }
    });
});

    //////////////////////////////////////////////////////////
    // NOW LINE
    //////////////////////////////////////////////////////////

    const xNow = (now.getTime() - d0.getTime()) * pxPerMs;

    ctx.strokeStyle = "red";
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(xNow, 0);
    ctx.lineTo(xNow, 240);
    ctx.stroke();

    //////////////////////////////////////////////////////////
    // FDP START MARKER
    //////////////////////////////////////////////////////////

    const fdpStartDate = fdpState.fdpStart;

    linjaler.forEach(l => {
        const linStart = l.start.getTime();
        const linEnd   = linStart + 24 * 3600 * 1000;

        if (fdpStartDate.getTime() < linStart || fdpStartDate.getTime() > linEnd) return;

        const x = (fdpStartDate.getTime() - linStart) * pxPerMs;

        ctx.strokeStyle = "magenta";
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.moveTo(x, l.y - 20);
        ctx.lineTo(x, l.y + 30);
        ctx.stroke();

        ctx.fillStyle = "magenta";
        ctx.fillText("FDPStart", x, l.y + 45);
    });
}

//////////////////////////////////////////////////////////////
// UPDATE LOOP
//////////////////////////////////////////////////////////////

function uppdatera() {
    storleksanpassaCanvas();
    rita();
    setTimeout(uppdatera, 1000);
}

//////////////////////////////////////////////////////////////
// CLICK ON SHIFT
//////////////////////////////////////////////////////////////

canvas.addEventListener("click", e => {
    const rect   = canvas.getBoundingClientRect();
    const klickX = e.clientX - rect.left;
    const klickY = e.clientY - rect.top;
    let hittat   = false;

    for (const p of passPositions) {
        if (
            klickX >= p.xStart && klickX <= p.xStart + p.bredd &&
            klickY >= p.yStart && klickY <= p.yStart + p.höjd
        ) {
            markeratPassId = p.id;

            const pass = arbetspass.find(x => x.id === p.id);
            if (pass) {
                document.getElementById("start").value = localDatetimeString(pass.start);
                document.getElementById("slut").value  = localDatetimeString(pass.slut);
                redigerarIndex = arbetspass.findIndex(x => x.id === p.id);
                document.getElementById("btnTaBort").disabled = false;
            }

            hittat = true;
            break;
        }
    }
// Kolla vilor om inget pass hittades
if (!hittat) {
    for (const v of vilaPositions) {
        if (
            klickX >= v.xStart && klickX <= v.xStart + v.bredd &&
            klickY >= v.yStart && klickY <= v.yStart + v.höjd
        ) {
            markeradVilaIndex = v.index;
            markeratPassId = null;
            redigerarIndex = -1;
            document.getElementById("btnTaBort").disabled = true;
            hittat = true;
            break;
        }
    }
}


    if (!hittat) {
    markeratPassId = null;
    markeradVilaIndex = null;
    redigerarIndex = -1;
    document.getElementById("btnTaBort").disabled = true;
}


    rita();
});

//////////////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////////////

laddaFrånMinne();
säkerställDefaultPass();
uppdateraKnappar();
uppdatera();

</script>
